services:
  postgres:
    image: postgres:16-alpine
    container_name: irkado-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: irkado
      POSTGRES_USER: irkado
      POSTGRES_PASSWORD: Irazura8
    ports:
      - "5432:5432"
    volumes:
      - irkado-postgres-data:/var/lib/postgresql/data

volumes:
  irkado-postgres-data:
